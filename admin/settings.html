<h1>Store Settings</h1>


<p>Manage your shop details</p>


<!-- SETTINGS FORM -->


<div class="table-container" style="padding:20px;">


<form id="settingsForm">


<label>Store Name</label>
<input type="text" id="storeName" placeholder="FreshMart Ghosi">


<label>Phone Number</label>
<input type="text" id="phone" placeholder="+91xxxxxxxxxx">


<label>WhatsApp Number</label>
<input type="text" id="whatsapp" placeholder="+91xxxxxxxxxx">


<label>Address</label>
<input type="text" id="address" placeholder="Ghosi, Uttar Pradesh">


<label>Email</label>
<input type="email" id="email" placeholder="store@email.com">


<label>Google Maps Link</label>
<input type="text" id="map" placeholder="https://maps.google.com/...">


<button type="submit" class="btn" style="margin-top:15px;">
Save Settings
</button>


</form>
