<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="../css/style.css">

<style>

body{

margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#f3f5f7;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.login-box{

width:380px;
background:white;

padding:35px;

border-radius:15px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

}

h2{

text-align:center;

margin-bottom:25px;

}

input{

width:100%;
padding:12px;

margin-bottom:15px;

font-size:16px;

border:1px solid #ddd;

border-radius:8px;

box-sizing:border-box;

}

button{

width:100%;

padding:12px;

border:none;

border-radius:8px;

background:#28a745;

color:white;

font-size:17px;

cursor:pointer;

}

button:hover{

background:#23913d;

}

#error{

margin-top:15px;

color:red;

text-align:center;

}

</style>

</head>

<body>

<div class="login-box">

<h2>FreshMart Admin</h2>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Admin Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button>

Login

</button>

</form>

<div id="error"></div>

</div>
  <script type="module">

import { auth } from "../js/firebase.js";

import {

onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

onAuthStateChanged(auth,(user)=>{

if(user){

window.location.href="dashboard.html";

}

});

  </script>

<script type="module" src="js/login.js"></script>

</body>
</html>
